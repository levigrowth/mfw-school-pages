<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>커리어 인생 그래프</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Fraunces:ital,opsz,wght@0,9..144,300;1,9..144,300&display=swap" rel="stylesheet"/>
<style>
:root {
  --ink:     #1c1917;
  --ink2:    #57534e;
  --ink3:    #a8a29e;
  --ink4:    #d6d3d1;
  --paper:   #fafaf9;
  --paper2:  #f5f5f4;
  --paper3:  #e7e5e4;
  --signal:  #dc4f00;
  --signal2: #ff6b2b;
  --up:      #16a34a;
  --down:    #dc4f00;
  --accent:  #2563eb;
  --r:       10px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--paper);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ─── Header ─── */
.hdr {
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: center;
  gap: 1rem;
  padding: 1.1rem 2rem 1rem;
  border-bottom: 1px solid var(--paper3);
  background: #fff;
}
.hdr-left { display: flex; flex-direction: column; gap: 2px; }
.hdr-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--signal);
}
.hdr-title {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 300;
  font-style: italic;
  color: var(--ink);
  line-height: 1.2;
}
.hdr-sub { font-size: 11px; color: var(--ink3); margin-top: 1px; }
.hdr-actions { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }

/* ─── Toolbar ─── */
.tbar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0.6rem 2rem;
  border-bottom: 1px solid var(--paper3);
  background: var(--paper2);
  flex-wrap: wrap;
}
.tbar-group { display: flex; align-items: center; gap: 6px; }
.tbar-label { font-size: 11px; color: var(--ink3); white-space: nowrap; }
.tbar-input {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  background: #fff;
  border: 1px solid var(--paper3);
  color: var(--ink);
  border-radius: 6px;
  padding: 4px 8px;
  width: 62px;
  outline: none;
  transition: border-color 0.15s;
}
.tbar-input:focus { border-color: var(--signal); }
.sep { width: 1px; height: 18px; background: var(--paper3); }
.tog {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 4px 11px;
  border-radius: 6px;
  border: 1px solid var(--paper3);
  background: transparent;
  color: var(--ink3);
  cursor: pointer;
  transition: all 0.12s;
}
.tog.on { background: var(--ink); color: #fff; border-color: var(--ink); }
.tog:hover:not(.on) { color: var(--ink); border-color: var(--ink3); }

/* ─── Main ─── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 1.25rem 2rem;
  gap: 0.75rem;
  min-height: 0;
}
.canvas-wrap { position: relative; flex: 1; min-height: 200px; }
canvas {
  display: block;
  width: 100%;
  height: 100%;
  cursor: crosshair;
  border-radius: var(--r);
  border: 1px solid var(--paper3);
}
canvas.drag { cursor: grabbing; }
canvas.hov  { cursor: grab; }

/* ─── Legend ─── */
.legend {
  display: flex;
  gap: 1.25rem;
  flex-wrap: wrap;
  padding: 0 2px;
}
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--ink3); }
.leg-dot  { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ─── Popup ─── */
.popup {
  position: fixed;
  background: #fff;
  border: 1px solid var(--paper3);
  border-radius: 12px;
  padding: 0;
  width: 252px;
  z-index: 200;
  box-shadow: 0 4px 6px -1px rgba(0,0,0,.07), 0 12px 28px -4px rgba(0,0,0,.12);
  display: none;
  overflow: hidden;
}
.popup.vis { display: block; }
.popup-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 14px 10px;
  border-bottom: 1px solid var(--paper3);
  background: var(--paper2);
}
.popup-title {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--ink2);
}
.popup-x {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  color: var(--ink3);
  padding: 2px 5px;
  border-radius: 5px;
  transition: background 0.12s, color 0.12s;
}
.popup-x:hover { background: var(--paper3); color: var(--ink); }
.popup-body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 9px; }
.p-row label { font-size: 11px; color: var(--ink3); display: block; margin-bottom: 3px; }
.p-row input, .p-row textarea, .p-row select {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  background: var(--paper2);
  border: 1px solid var(--paper3);
  color: var(--ink);
  border-radius: 7px;
  padding: 6px 9px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
  resize: none;
}
.p-row input:focus, .p-row textarea:focus, .p-row select:focus { border-color: var(--signal); background: #fff; }
.p-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.popup-foot { display: flex; gap: 7px; }
.p-btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 7px 0;
  border-radius: 7px;
  border: none;
  cursor: pointer;
  transition: opacity 0.12s;
  flex: 1;
}
.p-btn:hover { opacity: 0.82; }
.p-save   { background: var(--signal); color: #fff; }
.p-delete { background: var(--paper2); color: var(--ink2); border: 1px solid var(--paper3); }

/* ─── Buttons ─── */
.btn {
  font-family: 'Noto Sans KR', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 13px;
  border-radius: 7px;
  border: 1px solid var(--paper3);
  background: transparent;
  color: var(--ink2);
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  text-decoration: none;
  transition: all 0.12s;
}
.btn:hover { background: var(--paper2); color: var(--ink); }
.btn-primary { background: var(--signal); color: #fff; border-color: var(--signal); }
.btn-primary:hover { background: #b83d00; border-color: #b83d00; }
.save-ok { font-size: 12px; color: var(--up); display: none; align-items: center; gap: 4px; }

@media (max-width: 600px) {
  .hdr, .tbar, .main { padding-left: 1rem; padding-right: 1rem; }
  .hdr { grid-template-columns: 1fr; }
  .hdr-actions { flex-wrap: wrap; }
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <div class="hdr-eyebrow">Career Life Graph</div>
    <div class="hdr-title">커리어 인생 그래프</div>
    <div class="hdr-sub">마케터 · 창업가 · 커리어 체인저를 위한 성장 몰입 곡선 — Y축은 "나다운 일을 하고 있는가"의 정도</div>
  </div>
  <div class="hdr-actions">
    <span class="save-ok" id="save-ok">✓ 저장됨</span>
    <a class="btn" href="./index.html">홈으로</a>
    <button class="btn" onclick="clearAll()">↺ 초기화</button>
    <button class="btn" onclick="window.print()">⎙ 인쇄</button>
    <button class="btn btn-primary" onclick="saveData()">저장</button>
  </div>
</header>

<div class="tbar">
  <div class="tbar-group">
    <span class="tbar-label">시작 나이</span>
    <input class="tbar-input" id="age-start" type="number" value="5" min="0" max="50" onchange="rebuildAxis()"/>
  </div>
  <div class="tbar-group">
    <span class="tbar-label">현재 나이</span>
    <input class="tbar-input" id="age-end" type="number" value="35" min="10" max="100" onchange="rebuildAxis()"/>
  </div>
  <div class="sep"></div>
  <div class="tbar-group">
    <span class="tbar-label">스타일</span>
    <button class="tog on" id="btn-curve" onclick="setStyle('curve')">곡선</button>
    <button class="tog" id="btn-line"  onclick="setStyle('line')">꺾은선</button>
  </div>
  <div class="sep"></div>
  <div class="tbar-group">
    <span class="tbar-label">에피소드</span>
    <button class="tog on" id="btn-labels" onclick="toggleLabels()">표시</button>
  </div>
</div>

<main class="main">
  <div class="canvas-wrap" id="cwrap">
    <canvas id="gc" aria-label="성장 몰입 곡선 인터랙티브 캔버스"></canvas>
  </div>
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--up)"></div>포인트 드래그 → 몰입도 조정</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--accent)"></div>포인트 클릭 → 에피소드 기록</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--signal)"></div>빈 곳 클릭 → 포인트 추가</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--ink3)"></div>팝업 ✕ · 메모 없이 닫기 → 포인트 제거</div>
  </div>
</main>

<!-- Popup -->
<div class="popup" id="popup">
  <div class="popup-hdr">
    <span class="popup-title">에피소드</span>
    <button class="popup-x" onclick="cancelPopup()" aria-label="닫기">✕</button>
  </div>
  <div class="popup-body">
    <div class="p-row-2">
      <div class="p-row">
        <label>나이</label>
        <input type="number" id="p-age" min="0" max="100"/>
      </div>
      <div class="p-row">
        <label>몰입도 <span style="font-size:10px;color:var(--ink3)">-100~+100</span></label>
        <input type="number" id="p-score" min="-100" max="100"/>
      </div>
    </div>
    <div class="p-row">
      <label>어떤 일이 있었나요?</label>
      <textarea id="p-memo" rows="3" placeholder="캠페인, 이직, 창업, 실패, 깨달음..."></textarea>
    </div>
    <div class="p-row">
      <label>이 시기 나는</label>
      <select id="p-type">
        <option value="">— 선택 안 함 —</option>
        <option value="breakthrough">🚀 돌파구를 찾은 순간</option>
        <option value="turning">🌀 큰 분기점이 된 순간</option>
        <option value="learning">📖 뼈아프게 배운 순간</option>
        <option value="pivot">🔀 방향을 바꾼 순간</option>
        <option value="peak">⚡ 완전히 몰입했던 순간</option>
        <option value="lost">🧭 길을 잃었던 순간</option>
        <option value="start">🌱 새로운 시작</option>
      </select>
    </div>
    <div class="popup-foot">
      <button class="p-btn p-delete" onclick="deletePoint()">삭제</button>
      <button class="p-btn p-save"   onclick="savePoint()">저장</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('cwrap');
const popup  = document.getElementById('popup');
const dpr    = window.devicePixelRatio || 1;

const TYPE_ICONS = {
  breakthrough: '🚀', turning: '🌀', learning: '📖', pivot: '🔀',
  peak: '⚡', lost: '🧭', start: '🌱'
};

let points = [
  { age:8,  score:-55, memo:'예시: 방황했던 시기',         type:'lost' },
  { age:15, score:35,  memo:'예시: 처음 잘한다는 말을 들음', type:'learning' },
  { age:20, score:65,  memo:'예시: 내가 좋아하는 일 발견',  type:'peak' },
  { age:25, score:-25, memo:'예시: 첫 직장의 현실',         type:'lost' },
  { age:30, score:70,  memo:'예시: 내 방식으로 성과를 냄',  type:'breakthrough' },
  { age:35, score:45,  memo:'예시: 현재',                   type:'start' },
];

let ageStart=5, ageEnd=35, curveStyle='curve', showLabels=true;
let dragging=null, editingIdx=null, isNewPoint=false, hoveredIdx=null;
const PAD = { top:52, bottom:56, left:68, right:28 };
const PR  = 15;

const C = {
  bg:      '#ffffff',
  grid:    '#f0eeec',
  zero:    '#d0cdc9',
  axis:    '#b0aba6',
  label:   '#888480',
  up:      '#16a34a',
  down:    '#dc4f00',
  line:    '#1c1917',
  fillUp:  'rgba(22,163,74,0.08)',
  fillDn:  'rgba(220,79,0,0.08)',
};

/* ─── Coordinate helpers ─── */
const gW = () => wrap.clientWidth  || 700;
const gH = () => Math.max(200, wrap.clientHeight || 420);
const aX = a => PAD.left + ((a - ageStart) / (ageEnd - ageStart)) * (gW() - PAD.left - PAD.right);
const sY = s => { const h=gH(), mid=PAD.top+(h-PAD.top-PAD.bottom)/2; return mid - (s/100)*((h-PAD.top-PAD.bottom)/2); };
const xA = x => ageStart + ((x-PAD.left)/(gW()-PAD.left-PAD.right))*(ageEnd-ageStart);
const yS = y => { const h=gH(), mid=PAD.top+(h-PAD.top-PAD.bottom)/2; return Math.round(((mid-y)/((h-PAD.top-PAD.bottom)/2))*100); };

/* ─── Resize ─── */
function resize() {
  const w=gW(), h=gH();
  canvas.width=w*dpr; canvas.height=h*dpr;
  canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  draw();
}
new ResizeObserver(resize).observe(wrap);

/* ─── Draw ─── */
function draw() {
  const w=gW(), h=gH();
  ctx.clearRect(0,0,w,h);

  // bg
  ctx.fillStyle=C.bg;
  ctx.beginPath(); ctx.roundRect(0,0,w,h,10); ctx.fill();

  const mid = PAD.top + (h-PAD.top-PAD.bottom)/2;

  // horizontal grids
  ctx.strokeStyle=C.grid; ctx.lineWidth=1;
  [100,75,50,25,0,-25,-50,-75,-100].forEach(s => {
    const y=sY(s);
    ctx.beginPath(); ctx.moveTo(PAD.left,y); ctx.lineTo(w-PAD.right,y); ctx.stroke();
  });

  // vertical grids
  const step = Math.max(1, Math.ceil((ageEnd-ageStart)/12));
  for (let a=Math.ceil(ageStart/step)*step; a<=ageEnd; a+=step) {
    const x=aX(a);
    ctx.beginPath(); ctx.moveTo(x,PAD.top); ctx.lineTo(x,h-PAD.bottom); ctx.stroke();
  }

  // Y labels
  ctx.fillStyle=C.label; ctx.font='11px Noto Sans KR'; ctx.textAlign='right';
  [100,50,0,-50,-100].forEach(s => ctx.fillText(s>0?'+'+s:s, PAD.left-9, sY(s)+4));

  // X labels
  ctx.textAlign='center';
  for (let a=Math.ceil(ageStart/step)*step; a<=ageEnd; a+=step)
    ctx.fillText(a, aX(a), h-PAD.bottom+17);

  // Axis title Y
  ctx.save();
  ctx.translate(15,mid); ctx.rotate(-Math.PI/2);
  ctx.textAlign='center'; ctx.fillStyle=C.axis; ctx.font='11px Noto Sans KR';
  ctx.fillText('성장 몰입도',0,0);
  ctx.restore();

  // Axis title X
  ctx.fillStyle=C.axis; ctx.font='11px Noto Sans KR'; ctx.textAlign='center';
  ctx.fillText('나이', w/2, h-5);

  // Zero axis
  ctx.strokeStyle=C.zero; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(PAD.left,mid); ctx.lineTo(w-PAD.right,mid); ctx.stroke();
  ctx.strokeStyle=C.zero; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(PAD.left,PAD.top-8); ctx.lineTo(PAD.left,h-PAD.bottom+8); ctx.stroke();

  const sorted = [...points].sort((a,b)=>a.age-b.age);

  // Area fill
  if (sorted.length>=2) drawFill(sorted, mid, w, h);

  // Line
  if (sorted.length>=2) {
    ctx.strokeStyle=C.line; ctx.lineWidth=2.5; ctx.lineJoin='round';
    ctx.beginPath();
    if (curveStyle==='curve') drawCurve(sorted);
    else sorted.forEach((p,i) => { const x=aX(p.age),y=sY(p.score); i===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
    ctx.stroke();
  }

  // Labels
  if (showLabels) sorted.forEach(p => { if (p.memo) drawBubble(p); });

  // Points
  sorted.forEach(p => {
    const oi=points.indexOf(p), x=aX(p.age), y=sY(p.score);
    const isH=oi===hoveredIdx, isD=dragging&&dragging.idx===oi;
    // glow
    if (isH||isD) {
      const g=ctx.createRadialGradient(x,y,0,x,y,PR+8);
      g.addColorStop(0,p.score>=0?'rgba(22,163,74,0.18)':'rgba(220,79,0,0.18)');
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath(); ctx.arc(x,y,PR+8,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    }
    // circle
    ctx.beginPath(); ctx.arc(x,y,isD?PR+2:PR,0,Math.PI*2);
    ctx.fillStyle=p.score>=0?C.up:C.down; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2.5; ctx.stroke();
    // icon or age
    const icon = p.type ? TYPE_ICONS[p.type] : null;
    if (icon) {
      ctx.fillStyle = '#fff';
      ctx.font=`${PR-2}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(icon, x, y+1);
    } else {
      ctx.fillStyle='#fff'; ctx.font=`bold 11px Noto Sans KR`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(p.age, x, y);
    }
    ctx.textBaseline='alphabetic';
    // age below icon
    if (icon) {
      ctx.fillStyle=C.label; ctx.font='10px Noto Sans KR';
      ctx.textAlign='center'; ctx.textBaseline='alphabetic';
      ctx.fillText(p.age, x, y+PR+11);
    }
  });
}

function drawCurve(s) {
  ctx.moveTo(aX(s[0].age),sY(s[0].score));
  for (let i=0;i<s.length-1;i++) {
    const x0=aX(s[i].age),y0=sY(s[i].score),x1=aX(s[i+1].age),y1=sY(s[i+1].score);
    ctx.bezierCurveTo((x0+x1)/2,y0,(x0+x1)/2,y1,x1,y1);
  }
}

function drawFill(s, mid, w, h) {
  const path = () => {
    ctx.moveTo(aX(s[0].age),mid); ctx.lineTo(aX(s[0].age),sY(s[0].score));
    if (curveStyle==='curve') {
      for (let i=0;i<s.length-1;i++) {
        const x0=aX(s[i].age),y0=sY(s[i].score),x1=aX(s[i+1].age),y1=sY(s[i+1].score);
        ctx.bezierCurveTo((x0+x1)/2,y0,(x0+x1)/2,y1,x1,y1);
      }
    } else s.forEach(p=>ctx.lineTo(aX(p.age),sY(p.score)));
    ctx.lineTo(aX(s[s.length-1].age),mid); ctx.closePath();
  };
  // up fill
  ctx.save(); ctx.beginPath(); path();
  const gu=ctx.createLinearGradient(0,PAD.top,0,mid);
  gu.addColorStop(0,'rgba(22,163,74,0.14)'); gu.addColorStop(1,'rgba(22,163,74,0.0)');
  ctx.fillStyle=gu; ctx.fill(); ctx.restore();
  // down fill
  ctx.save(); ctx.beginPath(); path();
  const gd=ctx.createLinearGradient(0,mid,0,h-PAD.bottom);
  gd.addColorStop(0,'rgba(220,79,0,0.0)'); gd.addColorStop(1,'rgba(220,79,0,0.14)');
  ctx.fillStyle=gd; ctx.fill(); ctx.restore();
}

function drawBubble(p) {
  const x=aX(p.age), y=sY(p.score), above=p.score>=0;
  const icon = p.type ? TYPE_ICONS[p.type]+' ' : '';
  const lines = wrapText(icon+p.memo, 136);
  const lh=15, bw=158, bh=lines.length*lh+18, off=PR+8;
  let by = above ? y-off-bh : y+off;
  let bx = Math.max(PAD.left+2, Math.min(gW()-PAD.right-bw-2, x-bw/2));
  by = Math.max(4, Math.min(gH()-bh-4, by));

  ctx.save();
  // shadow
  ctx.shadowColor='rgba(0,0,0,0.08)'; ctx.shadowBlur=8; ctx.shadowOffsetY=2;
  ctx.fillStyle='#fffef0'; ctx.strokeStyle='rgba(180,160,60,0.35)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(bx,by,bw,bh,6); ctx.fill(); ctx.stroke();
  ctx.shadowColor='transparent';
  // arrow
  ctx.beginPath();
  if (above) { ctx.moveTo(x-5,by+bh); ctx.lineTo(x+5,by+bh); ctx.lineTo(x,y-off+4); }
  else        { ctx.moveTo(x-5,by);    ctx.lineTo(x+5,by);    ctx.lineTo(x,y+off-4); }
  ctx.fillStyle='#fffef0'; ctx.fill();
  // text
  ctx.fillStyle='#3a3530'; ctx.font='11px Noto Sans KR'; ctx.textAlign='left';
  lines.forEach((l,i) => ctx.fillText(l, bx+8, by+13+i*lh));
  ctx.restore();
}

function wrapText(text, maxW) {
  const lines=[]; let cur='';
  for (const ch of text) {
    const t=cur+ch;
    if (ctx.measureText(t).width>maxW && cur) { lines.push(cur); cur=ch; }
    else cur=t;
  }
  if (cur) lines.push(cur);
  return lines.slice(0,5);
}

/* ─── Hit test ─── */
function hit(mx,my) {
  for (let i=0;i<points.length;i++) {
    const dx=mx-aX(points[i].age), dy=my-sY(points[i].score);
    if (Math.sqrt(dx*dx+dy*dy)<PR+5) return i;
  }
  return -1;
}

/* ─── Events ─── */
function ePos(e) {
  const r=canvas.getBoundingClientRect();
  if (e.touches) return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top};
  return {x:e.clientX-r.left, y:e.clientY-r.top};
}

canvas.addEventListener('mousedown', onDown);
canvas.addEventListener('touchstart', onDown, {passive:false});
function onDown(e) {
  e.preventDefault(); closePopup(false);
  const {x,y}=ePos(e), idx=hit(x,y);
  if (idx>=0) { dragging={idx,startY:y}; canvas.classList.add('drag'); }
  else {
    const age=Math.round(xA(x)), score=Math.max(-100,Math.min(100,Math.round(yS(y))));
    if (age>=ageStart && age<=ageEnd) {
      points.push({age,score,memo:'',type:''});
      draw(); openPopup(points.length-1, e, true);
    }
  }
}

canvas.addEventListener('mousemove', onMove);
canvas.addEventListener('touchmove', onMove, {passive:false});
function onMove(e) {
  e.preventDefault();
  const {x,y}=ePos(e);
  if (dragging) {
    points[dragging.idx].score=Math.max(-100,Math.min(100,Math.round(yS(y))));
    draw();
  } else {
    const idx=hit(x,y);
    if (idx!==hoveredIdx) {
      hoveredIdx=idx;
      canvas.classList.toggle('hov', idx>=0);
      draw();
    }
  }
}

canvas.addEventListener('mouseup', onUp);
canvas.addEventListener('touchend', onUp);
function onUp(e) {
  if (!dragging) return;
  const d=dragging; dragging=null; canvas.classList.remove('drag');
  const r=canvas.getBoundingClientRect();
  const cy=e.changedTouches?e.changedTouches[0].clientY-r.top:e.clientY-r.top;
  if (Math.abs(cy-d.startY)<6) openPopup(d.idx, e, false);
  draw();
}

canvas.addEventListener('mouseleave', ()=>{ hoveredIdx=null; canvas.classList.remove('hov'); draw(); });

/* ─── Popup ─── */
function openPopup(idx, e, isNew=false) {
  editingIdx=idx; isNewPoint=isNew;
  const p=points[idx];
  document.getElementById('p-age').value   = p.age;
  document.getElementById('p-score').value = p.score;
  document.getElementById('p-memo').value  = p.memo||'';
  document.getElementById('p-type').value  = p.type||'';
  popup.style.display='block';
  const r=canvas.getBoundingClientRect();
  const px=aX(p.age)+r.left, py=sY(p.score)+r.top;
  const pw=252, ph=290;
  let left=px+14, top=py-ph/2;
  if (left+pw>window.innerWidth-8) left=px-pw-14;
  top=Math.max(8, Math.min(window.innerHeight-ph-8, top));
  popup.style.left=left+'px'; popup.style.top=top+'px';
  popup.classList.add('vis');
  document.getElementById('p-memo').focus();
}

function closePopup(restoreNew=true) {
  if (restoreNew && isNewPoint && editingIdx!==null) {
    points.splice(editingIdx,1); draw();
  }
  popup.classList.remove('vis'); popup.style.display='none';
  editingIdx=null; isNewPoint=false;
}

function cancelPopup() { closePopup(true); }

function savePoint() {
  if (editingIdx===null) return;
  const age   = Math.max(ageStart, Math.min(ageEnd, parseInt(document.getElementById('p-age').value)||0));
  const score = Math.max(-100, Math.min(100, parseInt(document.getElementById('p-score').value)||0));
  const memo  = document.getElementById('p-memo').value.trim();
  const type  = document.getElementById('p-type').value;
  points[editingIdx]={age,score,memo,type};
  closePopup(false); draw();
}

function deletePoint() {
  if (editingIdx===null) return;
  points.splice(editingIdx,1);
  closePopup(false); draw();
}

document.addEventListener('keydown', e => {
  if (e.key==='Escape') cancelPopup();
  if (e.key==='Enter' && editingIdx!==null && !e.shiftKey && document.activeElement!==document.getElementById('p-memo')) savePoint();
});

/* ─── Controls ─── */
function setStyle(s) {
  curveStyle=s;
  document.getElementById('btn-curve').classList.toggle('on', s==='curve');
  document.getElementById('btn-line').classList.toggle('on',  s==='line');
  draw();
}
function toggleLabels() {
  showLabels=!showLabels;
  const b=document.getElementById('btn-labels');
  b.classList.toggle('on', showLabels); b.textContent=showLabels?'표시':'숨김';
  draw();
}
function rebuildAxis() {
  ageStart=parseInt(document.getElementById('age-start').value)||5;
  ageEnd  =parseInt(document.getElementById('age-end').value)  ||35;
  draw();
}

/* ─── Save / Load ─── */
const KEY='gc_v2';
function saveData() {
  try { localStorage.setItem(KEY, JSON.stringify({points,ageStart,ageEnd,curveStyle,showLabels})); } catch(e){}
  const ok=document.getElementById('save-ok');
  ok.style.display='flex'; setTimeout(()=>ok.style.display='none',2000);
}
function loadData() {
  try {
    const d=JSON.parse(localStorage.getItem(KEY)||'null');
    if (!d) return;
    if (d.points)    { points=d.points; }
    if (d.ageStart)  { ageStart=d.ageStart; document.getElementById('age-start').value=ageStart; }
    if (d.ageEnd)    { ageEnd=d.ageEnd;     document.getElementById('age-end').value=ageEnd; }
    if (d.curveStyle) setStyle(d.curveStyle);
    if (typeof d.showLabels!=='undefined') { showLabels=d.showLabels; const b=document.getElementById('btn-labels'); b.classList.toggle('on',showLabels); b.textContent=showLabels?'표시':'숨김'; }
  } catch(e) {}
}
function clearAll() {
  if (!confirm('모든 포인트를 초기화할까요?')) return;
  points=[];
  try { localStorage.removeItem(KEY); } catch(e){}
  draw();
}

loadData(); resize();
</script>
