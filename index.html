<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>홈 · 김용훈 그로스 연구소</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #f7f5f2;
  --bg-card: #ffffff;
  --text: #1a1a1a;
  --text2: #555;
  --text3: #999;
  --border: #e5e3dc;
  --border-hover: #ccc9c3;
  --purple: #7F77DD;
  --purple-light: #EEEDFE;
  --purple-dark: #3C3489;
  --coral: #e85d3a;
  --coral-light: #fae5de;
  --coral-dark: #a8401f;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; overflow-x: hidden; }
body {
  font-family: 'Noto Sans KR', sans-serif;
  background:
    radial-gradient(1200px 500px at 50% -10%, #fbfaf8 0%, var(--bg) 55%),
    var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2.75rem 1.25rem;
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; opacity: 0.4;
  background-image: radial-gradient(rgba(0,0,0,0.018) 1px, transparent 1px);
  background-size: 4px 4px;
}
.wrap { position: relative; width: 100%; max-width: 880px; }

/* Hero */
.hero { text-align: center; margin-bottom: 2.75rem; }
.brand {
  width: 86px; height: auto;
  margin: 0 auto 1.5rem;
  display: block;
  opacity: 0.92;
}
.eyebrow {
  font-size: 11px; font-weight: 500; letter-spacing: 0.18em;
  text-transform: uppercase; color: var(--text3);
  display: flex; align-items: center; justify-content: center;
  gap: 10px; margin-bottom: 1.1rem;
}
.eyebrow::before, .eyebrow::after { content: ''; width: 34px; height: 1px; background: var(--border-hover); }
.hero h1 {
  font-family: 'Instrument Serif', serif; font-style: italic; font-weight: 400;
  font-size: 46px; line-height: 1.15; color: var(--text); margin-bottom: 0.9rem;
}
.hero h1 span { font-style: normal; color: var(--text3); }
.hero p { font-size: 14px; color: var(--text2); line-height: 1.7; }

/* Cards */
.cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem; }
@media (max-width: 640px) {
  .cards { grid-template-columns: 1fr; }
  .hero h1 { font-size: 34px; }
}
.card {
  position: relative; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 2rem 1.75rem 1.6rem; cursor: pointer;
  overflow: hidden; text-align: left; display: flex; flex-direction: column;
  gap: 1rem; min-height: 230px;
  transition: transform 0.25s cubic-bezier(.2,.8,.2,1), box-shadow 0.25s ease, border-color 0.2s ease;
  -webkit-tap-highlight-color: transparent;
}
.card::after { content: ''; position: absolute; inset: 0 0 auto 0; height: 4px; }
.card:hover { transform: translateY(-5px); box-shadow: 0 18px 40px -18px rgba(0,0,0,0.22); border-color: var(--border-hover); }
.card:focus-visible { outline: none; }
.card.vision { order: 2; }
.card.graph { order: 1; }
.card.vision::after { background: var(--purple); }
.card.vision:hover { border-color: var(--purple); }
.card.vision:focus-visible { box-shadow: 0 0 0 3px rgba(127,119,221,0.28); border-color: var(--purple); }
.card.vision .icon { background: var(--purple-light); color: var(--purple-dark); }
.card.vision .go { color: var(--purple-dark); }
.card.vision .glow { background: radial-gradient(circle, rgba(127,119,221,0.16), transparent 70%); }
.card.graph::after { background: var(--coral); }
.card.graph:hover { border-color: var(--coral); }
.card.graph:focus-visible { box-shadow: 0 0 0 3px rgba(232,93,58,0.25); border-color: var(--coral); }
.card.graph .icon { background: var(--coral-light); color: var(--coral-dark); }
.card.graph .go { color: var(--coral-dark); }
.card.graph .glow { background: radial-gradient(circle, rgba(232,93,58,0.16), transparent 70%); }
.glow {
  position: absolute; width: 220px; height: 220px; border-radius: 50%;
  top: -90px; right: -70px; pointer-events: none; opacity: 0; transition: opacity 0.3s ease;
}
.card:hover .glow { opacity: 1; }
.icon { width: 52px; height: 52px; border-radius: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.icon svg { width: 26px; height: 26px; }
.card-body { flex: 1; }
.card-num { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 14px; color: var(--text3); margin-bottom: 4px; display: block; }
.card h2 { font-size: 21px; font-weight: 700; color: var(--text); margin-bottom: 8px; letter-spacing: -0.01em; }
.card .desc { font-size: 13px; color: var(--text2); line-height: 1.65; }
.go { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; font-weight: 700; transition: gap 0.2s ease; }
.card:hover .go { gap: 11px; }
.go svg { width: 15px; height: 15px; }

/* Footer */
.foot { text-align: center; margin-top: 2.5rem; font-size: 12px; color: var(--text3); }
.foot b { font-weight: 500; color: var(--text2); }
.footer-shortcuts {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 14px;
  flex-wrap: wrap;
}
.footer-shortcuts span {
  font-size: 12px;
  font-weight: 700;
  color: var(--text2);
}
.footer-link {
  width: 34px;
  height: 34px;
  border: 1px solid var(--border-hover);
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: var(--text2);
  background: rgba(255,255,255,0.62);
  text-decoration: none;
  transition: transform 0.2s ease, color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
}
.footer-link:hover,
.footer-link:focus-visible {
  color: var(--purple-dark);
  border-color: var(--purple);
  background: var(--purple-light);
  transform: translateY(-2px);
  outline: none;
}
.footer-link svg {
  width: 18px;
  height: 18px;
}

@keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
.hero, .card, .foot { animation: fadeUp 0.5s ease both; }
.card.graph { animation-delay: 0.08s; }
.card.vision { animation-delay: 0.16s; }
.foot { animation-delay: 0.24s; }
</style>
</head>
